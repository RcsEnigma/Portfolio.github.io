<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ Ambrozic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0e0e0e;
  --surface:   #161616;
  --surface2:  #1c1c1c;
  --border:    #2a2a2a;
  --text:      #e8e4dc;
  --muted:     #6b6860;
  --accent:    #c8b89a;
  --accent2:   #7a9e8a;
  --tag-bg:    #1e1e1e;
  --tag-active:#c8b89a;
  --tag-text:  #8a8278;
  --radius:    3px;
  --mono:      Consolas, Monaco, monospace;
  --sans:      'Roboto', sans-serif;
  --transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Header ───────────────────────────────────────────────── */
#site-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}

#wordmark {
  font-family: var(--mono); font-weight: 400;
  font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent); text-decoration: none;
  transition: opacity 0.2s;
}
#wordmark:hover { opacity: 0.6; }

#site-nav { display: flex; gap: 2rem; align-items: center; }

.nav-link {
  font-family: var(--mono); font-size: 0.72rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  transition: color 0.2s; cursor: pointer;
}
.nav-link:hover, .nav-link.active { color: var(--text); }

/* ── Carousel ─────────────────────────────────────────────── */
#carousel-section {
  position: relative; width: 100%;
  height: clamp(300px, 52vw, 680px);
  overflow: hidden; background: #000;
}

.carousel-slide {
  position: absolute; inset: 0; opacity: 0;
  transition: opacity 1.1s ease;
  display: flex; align-items: flex-end;
}
.carousel-slide.active { opacity: 1; }

.carousel-slide img, .carousel-slide video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; filter: brightness(0.5);
}
.carousel-slide .media-placeholder {
  position: absolute; inset: 0; filter: brightness(0.5);
}

.carousel-caption {
  position: relative; z-index: 2;
  padding: 2.5rem 3rem; max-width: 680px;
}
.carousel-tag {
  font-family: var(--mono); font-size: 0.65rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 0.5rem;
}
.carousel-title {
  font-family: var(--mono);
  font-size: clamp(1.8rem, 4vw, 3.2rem);
  font-weight: 700; line-height: 1.1; color: #fff;
  margin-bottom: 0.75rem;
}
.carousel-desc {
  font-size: 0.88rem; color: rgba(255,255,255,0.58);
  max-width: 480px; line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

.carousel-controls {
  position: absolute; bottom: 1.5rem; right: 2.5rem;
  display: flex; gap: 0.5rem; z-index: 3;
}
.carousel-dot {
  width: 24px; height: 2px;
  background: rgba(255,255,255,0.22); cursor: pointer;
  transition: background 0.3s, width 0.3s;
}
.carousel-dot.active { background: var(--accent); width: 40px; }

/* ── Works Section ────────────────────────────────────────── */
#works-section {
  padding: 3rem 2.5rem 5rem;
  max-width: 1600px; margin: 0 auto;
}

/* ── Filter Bar ───────────────────────────────────────────── */
#filter-bar {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  margin-bottom: 2.5rem; align-items: center;
}
.filter-label {
  font-family: var(--mono); font-size: 0.65rem;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-right: 0.5rem;
}
.filter-tag {
  font-family: var(--mono); font-size: 0.65rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.3rem 0.7rem;
  background: var(--tag-bg); border: 1px solid var(--border);
  color: var(--tag-text); cursor: pointer;
  border-radius: var(--radius); transition: all 0.18s;
}
.filter-tag:hover { border-color: var(--muted); color: var(--text); }
.filter-tag.active {
  background: var(--tag-active); border-color: var(--tag-active);
  color: #0e0e0e;
}

/* ── Grid ─────────────────────────────────────────────────── */
#works-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 3px;
  grid-auto-rows: 280px;
  grid-auto-flow: dense;
}

.grid-item {
  position: relative; overflow: hidden;
  background: var(--surface); cursor: pointer;
  border-radius: var(--radius);
}
.grid-item[data-span="wide"]      { grid-column: span 2; }
.grid-item[data-span="tall"]      { grid-row: span 2; }
.grid-item[data-span="large"]     { grid-column: span 2; grid-row: span 2; }
.grid-item[data-span="ultrawide"] { grid-column: span 3; }

.grid-item img, .grid-item video {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform var(--transition), filter var(--transition);
}
.grid-item:hover img, .grid-item:hover video {
  transform: scale(1.04); filter: brightness(0.28);
}

.grid-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  transition: filter var(--transition);
}
.grid-item:hover .grid-placeholder { filter: brightness(0.28); }

.grid-hover-info {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 1.2rem; opacity: 0;
  transition: opacity var(--transition); pointer-events: none;
}
.grid-item:hover .grid-hover-info { opacity: 1; }

.grid-hover-title {
  font-family: var(--mono);
  font-size: 1rem; font-weight: 700;
  color: #fff; line-height: 1.2; margin-bottom: 0.3rem;
}
.grid-hover-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.grid-hover-tag {
  font-family: var(--mono); font-size: 0.58rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent);
}
.grid-hover-tag::after { content: ","; }
.grid-hover-tag:last-child::after { content: ""; }

.multi-badge {
  position: absolute; top: 0.7rem; right: 0.7rem;
  font-family: var(--mono); font-size: 0.6rem;
  padding: 0.2rem 0.45rem;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.65); letter-spacing: 0.08em;
  border-radius: 2px; z-index: 2; backdrop-filter: blur(4px);
}
.grid-item.hidden { display: none; }

/* ── MODAL — full-screen lightbox ────────────────────────── */
#modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(5,5,5,0.97);
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s ease;
}
#modal-overlay.open { opacity: 1; pointer-events: all; }

/* Top bar */
#modal-topbar {
  height: 52px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 1.4rem; gap: 1rem;
}
#modal-title-display {
  font-family: var(--mono); font-size: 0.8rem;
  letter-spacing: 0.07em; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#modal-topbar-actions { display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; }

.mbtn {
  font-family: var(--mono); font-size: 0.62rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.28rem 0.65rem;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; border-radius: var(--radius);
  transition: all 0.18s; line-height: 1;
}
.mbtn:hover { border-color: var(--accent); color: var(--accent); }
.mbtn.mbtn-on { background: var(--accent); border-color: var(--accent); color: #0d0d0d; }
.mbtn-icon {
  width: 30px; height: 30px; padding: 0; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
}

/* Stage (image area) */
#modal-stage {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  min-height: 0;
}

.modal-slot {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 1.8rem 5rem;
  opacity: 0; transition: opacity 0.42s ease;
  pointer-events: none;
}
.modal-slot.active { opacity: 1; pointer-events: all; }

.modal-slot img {
  max-width: 100%; max-height: 100%;
  width: auto; height: auto;
  display: block; object-fit: contain;
  cursor: zoom-in;
}
.modal-slot video {
  max-width: 100%; max-height: 100%;
  width: auto; height: auto;
  display: block; object-fit: contain;
}

/* Loading spinner */
#modal-spinner {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 28px; height: 28px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
#modal-spinner.visible { opacity: 1; }
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

/* Arrows */
.modal-arrow {
  position: absolute; top: 50%; transform: translateY(-50%); z-index: 5;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--muted); width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.3rem; line-height: 1;
  transition: all 0.2s;
}
.modal-arrow:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: var(--muted); }
#modal-prev { left: 1.1rem; }
#modal-next { right: 1.1rem; }

/* Bottom bar (dots) */
#modal-bottombar {
  height: 46px; flex-shrink: 0;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.modal-media-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.18); cursor: pointer;
  transition: background 0.2s, transform 0.2s;
}
.modal-media-dot.active { background: var(--accent); transform: scale(1.45); }

/* Info panel — slides in from right */
#modal-info-panel {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: min(370px, 92vw);
  background: var(--surface);
  border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform var(--transition);
  z-index: 10; overflow-y: auto;
  display: flex; flex-direction: column; gap: 1.1rem;
  padding: 1.4rem 1.6rem;
}
#modal-info-panel.open { transform: translateX(0); }

#modal-info-close-row {
  display: flex; justify-content: flex-end; margin-bottom: -0.2rem;
}
#modal-info-close {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; transition: all 0.2s; flex-shrink: 0;
}
#modal-info-close:hover { border-color: var(--muted); color: var(--text); }

#modal-info-date {
  font-family: var(--mono); font-size: 0.62rem;
  letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase;
}
#modal-info-title {
  font-family: var(--mono); font-size: 1.25rem;
  font-weight: 700; color: var(--text); line-height: 1.2;
}
#modal-info-desc {
  font-size: 0.87rem; color: rgba(232,228,220,0.68);
  line-height: 1.8; white-space: pre-line; flex: 1;
}
#modal-info-tags { display: flex; flex-wrap: wrap; gap: 0.32rem; }
.modal-tag {
  font-family: var(--mono); font-size: 0.62rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.22rem 0.55rem;
  background: var(--tag-bg); border: 1px solid var(--border);
  color: var(--accent); border-radius: var(--radius);
}
#modal-info-link {
  font-family: var(--mono); font-size: 0.7rem;
  letter-spacing: 0.08em; color: var(--accent2);
  text-decoration: none; border-bottom: 1px solid var(--accent2);
  padding-bottom: 2px; width: fit-content; transition: opacity 0.2s;
}
#modal-info-link:hover { opacity: 0.6; }

/* ── Zoom overlay ─────────────────────────────────────────── */
#zoom-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.22s ease;
  overflow: auto; cursor: zoom-out;
}
#zoom-overlay.open { opacity: 1; pointer-events: all; }

#zoom-content img, #zoom-content video {
  max-width: 98vw; max-height: 98vh;
  width: auto; height: auto;
  display: block; object-fit: contain;
}
#zoom-close-btn {
  position: fixed; top: 1rem; right: 1rem;
  background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.8); width: 34px; height: 34px;
  border-radius: 50%; cursor: pointer; font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  z-index: 301; transition: background 0.2s;
}
#zoom-close-btn:hover { background: rgba(255,255,255,0.1); }

/* ── Static pages ─────────────────────────────────────────── */
.static-page { display: none; max-width: 680px; margin: 6rem auto; padding: 0 2.5rem; }
.static-page.active { display: block; }
.static-page h1 {
  font-family: var(--mono);
  font-size: 2.2rem; margin-bottom: 1.5rem; color: var(--accent);
}
.static-page p {
  font-size: 0.92rem; line-height: 1.9;
  color: rgba(232,228,220,0.72); margin-bottom: 1rem;
}
.static-page a { color: var(--accent2); text-decoration: none; border-bottom: 1px solid var(--accent2); }

/* ── Footer ───────────────────────────────────────────────── */
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 2.5rem;
  display: flex; justify-content: space-between; align-items: center;
}
footer span {
  font-family: var(--mono); font-size: 0.62rem;
  letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase;
}

/* ── Demo placeholder gradients ───────────────────────────── */
.demo-grad-1 { background: linear-gradient(135deg,#1a1a2e,#0f3460); }
.demo-grad-2 { background: linear-gradient(135deg,#1a0a0a,#2d1515); }
.demo-grad-3 { background: linear-gradient(135deg,#0a1a0e,#0d2010); }
.demo-grad-4 { background: linear-gradient(135deg,#1a1508,#2a2010); }
.demo-content {
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:0.65rem; letter-spacing:.1em;
  color:rgba(255,255,255,0.12); text-transform:uppercase;
}

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Mobile ───────────────────────────────────────────────── */
@media (max-width: 640px) {
  #site-header { padding: 0 1.1rem; height: 50px; }
  #site-nav { gap: 1.3rem; }
  .nav-link { font-size: 0.68rem; }

  #carousel-section { height: clamp(220px, 58vw, 360px); }
  .carousel-caption { padding: 1.2rem 1.4rem; }
  .carousel-title { font-size: clamp(1.3rem, 6vw, 1.8rem); }
  .carousel-desc { display: none; }

  #works-section { padding: 1.6rem 0.8rem 4rem; }
  #filter-bar { margin-bottom: 1.4rem; }

  /* 2-column grid; collapse all spans to 1×1 */
  #works-grid {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 190px;
    gap: 2px;
  }
  .grid-item[data-span="wide"],
  .grid-item[data-span="tall"],
  .grid-item[data-span="large"],
  .grid-item[data-span="ultrawide"] {
    grid-column: span 1;
    grid-row: span 1;
  }

  /* Modal top bar: compact */
  #modal-topbar { padding: 0 0.75rem; height: 48px; gap: 0.5rem; }
  #modal-title-display { font-size: 0.72rem; }
  .mbtn { padding: 0.24rem 0.52rem; font-size: 0.58rem; }
  #modal-zoom-btn { display: none; } /* pinch-zoom works natively on mobile */

  /* Tighter padding so image fills more screen */
  .modal-slot { padding: 0.8rem 3rem; }
  #modal-prev { left: 0.35rem; }
  #modal-next { right: 0.35rem; }
  .modal-arrow { width: 34px; height: 34px; font-size: 1.1rem; }

  /* Info panel full-width on mobile */
  #modal-info-panel { width: 100vw; border-left: none; border-top: 1px solid var(--border); }

  /* Static pages */
  .static-page { margin: 3rem auto; padding: 0 1.4rem; }
  .static-page h1 { font-size: 1.6rem; }

  footer { padding: 1.2rem 1.1rem; flex-direction: column; gap: 0.4rem; text-align: center; }
}

@media (max-width: 380px) {
  /* Single column on very small phones */
  #works-grid {
    grid-template-columns: 1fr;
    grid-auto-rows: 220px;
  }
  /* Just show close, keep Info */
  #modal-title-display { display: none; }
}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────── -->
<header id="site-header">
  <a id="wordmark" href="#" onclick="showPage('home')">AJ Ambrozic</a>
  <nav id="site-nav">
    <a class="nav-link active" onclick="showPage('home')">Work</a>
    <a class="nav-link" onclick="showPage('about')">About</a>
    <a class="nav-link" onclick="showPage('contact')">Contact</a>
  </nav>
</header>

<!-- ── CAROUSEL ───────────────────────────────────────────────── -->
<section id="carousel-section" style="display:none">
  <div id="carousel-track"></div>
  <div class="carousel-controls" id="carousel-dots"></div>
</section>

<!-- ── WORKS ──────────────────────────────────────────────────── -->
<main id="home-page">
  <section id="works-section">
    <div id="filter-bar">
      <span class="filter-label">Filter —</span>
      <button class="filter-tag active" data-tag="all">All</button>
    </div>
    <div id="works-grid"></div>
  </section>
</main>

<!-- ── ABOUT ──────────────────────────────────────────────────── -->
<div class="static-page" id="about-page">
  <h1>About</h1>
  <p>blah</p>
  <p>blah</p>
  <p>blah</p>
</div>

<!-- ── CONTACT ────────────────────────────────────────────────── -->
<div class="static-page" id="contact-page">
  <h1>Contact</h1>
  <p>blah<br><a href="mailto:hello@studio.example">hello@studio.example</a></p>
  <p>Instagram: <a href="#">@studio.handle</a><br>blah: <a href="#">studio-handle</a></p>
  <p>blah</p>
</div>

<!-- ── MODAL ──────────────────────────────────────────────────── -->
<div id="modal-overlay">

  <!-- Top bar -->
  <div id="modal-topbar">
    <span id="modal-title-display"></span>
    <div id="modal-topbar-actions">
      <button class="mbtn" id="modal-info-btn" onclick="toggleInfoPanel()">Info</button>
      <button class="mbtn" id="modal-zoom-btn" onclick="openZoom()">Zoom ⊕</button>
      <button class="mbtn mbtn-icon" onclick="closeModal()">✕</button>
    </div>
  </div>

  <!-- Image stage -->
  <div id="modal-stage">
    <div id="modal-slot-a" class="modal-slot active"></div>
    <div id="modal-slot-b" class="modal-slot"></div>
    <div id="modal-spinner"></div>
    <button class="modal-arrow" id="modal-prev" onclick="stepMedia(-1)">‹</button>
    <button class="modal-arrow" id="modal-next" onclick="stepMedia(1)">›</button>
  </div>

  <!-- Bottom bar -->
  <div id="modal-bottombar">
    <div id="modal-media-nav"></div>
  </div>

  <!-- Info panel (slides in) -->
  <div id="modal-info-panel">
    <div id="modal-info-close-row">
      <button id="modal-info-close" onclick="toggleInfoPanel()">✕</button>
    </div>
    <div id="modal-info-date"></div>
    <h2 id="modal-info-title"></h2>
    <p id="modal-info-desc"></p>
    <div id="modal-info-tags"></div>
    <a id="modal-info-link" href="#" target="_blank" rel="noopener" style="display:none">View external ↗</a>
  </div>

</div>

<!-- ── ZOOM OVERLAY ────────────────────────────────────────── -->
<div id="zoom-overlay" onclick="closeZoom()">
  <button id="zoom-close-btn" onclick="closeZoom()">✕</button>
  <div id="zoom-content" onclick="event.stopPropagation()"></div>
</div>

<!-- ── FOOTER ─────────────────────────────────────────────────── -->
<footer>
  <span id="footer-count"></span>
  <span>Run node generate-manifest.js after adding works</span>
</footer>

<script>
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let manifest        = null;
let activeFilters   = new Set(["all"]);
let carouselIndex   = 0;
let carouselTimer   = null;
let modalWork       = null;
let modalMediaIndex = 0;
let currentSlot     = 'a';
let infoPanelOpen   = false;

const DEMO_GRADS = ["demo-grad-1","demo-grad-2","demo-grad-3","demo-grad-4"];

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════
async function boot() {
  try {
    const res = await fetch("manifest.json?" + Date.now());
    manifest = await res.json();
  } catch(e) {
    manifest = getDemoManifest();
  }
  buildFilterBar();
  buildCarousel();
  buildGrid();
  updateFooter();
}

// ═══════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════
function showPage(page) {
  document.getElementById("home-page").style.display = page === "home" ? "" : "none";
  const hasFeatured = manifest?.works?.some(w => w.featured);
  document.getElementById("carousel-section").style.display =
    page === "home" && hasFeatured ? "" : "none";

  document.querySelectorAll(".static-page").forEach(el => el.classList.remove("active"));
  if (page !== "home") {
    const el = document.getElementById(page + "-page");
    if (el) el.classList.add("active");
  }
  document.querySelectorAll(".nav-link").forEach(a => {
    a.classList.toggle("active",
      a.textContent.toLowerCase().includes(page === "home" ? "work" : page));
  });
}

// ═══════════════════════════════════════════════════════════════
//  FILTER BAR
// ═══════════════════════════════════════════════════════════════
function buildFilterBar() {
  const bar = document.getElementById("filter-bar");
  while (bar.children.length > 2) bar.removeChild(bar.lastChild);
  (manifest.tags || []).forEach(tag => {
    const btn = document.createElement("button");
    btn.className = "filter-tag"; btn.dataset.tag = tag; btn.textContent = tag;
    btn.onclick = () => toggleFilter(tag);
    bar.appendChild(btn);
  });
  document.querySelector('.filter-tag[data-tag="all"]').onclick = () => toggleFilter("all");
}

function toggleFilter(tag) {
  if (tag === "all") {
    activeFilters = new Set(["all"]);
  } else {
    activeFilters.delete("all");
    activeFilters.has(tag) ? activeFilters.delete(tag) : activeFilters.add(tag);
    if (!activeFilters.size) activeFilters.add("all");
  }
  document.querySelectorAll(".filter-tag").forEach(btn =>
    btn.classList.toggle("active", activeFilters.has(btn.dataset.tag)));
  filterGrid();
}

function filterGrid() {
  document.querySelectorAll(".grid-item").forEach(item => {
    if (activeFilters.has("all")) { item.classList.remove("hidden"); return; }
    const tags = JSON.parse(item.dataset.tags || "[]");
    item.classList.toggle("hidden", !tags.some(t => activeFilters.has(t)));
  });
}

// ═══════════════════════════════════════════════════════════════
//  CAROUSEL
// ═══════════════════════════════════════════════════════════════
function buildCarousel() {
  const featured = manifest.works.filter(w => w.featured);
  const section = document.getElementById("carousel-section");
  if (!featured.length) { section.style.display = "none"; return; }
  section.style.display = "";

  const track = document.getElementById("carousel-track");
  const dots  = document.getElementById("carousel-dots");
  track.innerHTML = ""; dots.innerHTML = "";

  featured.forEach((work, i) => {
    const slide = document.createElement("div");
    slide.className = "carousel-slide" + (i === 0 ? " active" : "");

    const mEl = createMediaEl(work.primaryMedia, work.type, true);
    if (mEl) { slide.appendChild(mEl); }
    else {
      const ph = document.createElement("div");
      ph.className = "media-placeholder " + DEMO_GRADS[i % DEMO_GRADS.length];
      slide.appendChild(ph);
    }

    const cap = document.createElement("div");
    cap.className = "carousel-caption";
    cap.innerHTML = `
      <div class="carousel-tag">${work.tags.slice(0,2).join(" · ")}</div>
      <div class="carousel-title">${esc(work.title)}</div>
      <div class="carousel-desc">${esc((work.description||"").split("\n")[0])}</div>`;
    cap.style.cursor = "pointer";
    cap.onclick = () => openModal(work);
    slide.appendChild(cap);
    track.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "carousel-dot" + (i === 0 ? " active" : "");
    dot.onclick = () => goCarousel(i);
    dots.appendChild(dot);
  });

  clearInterval(carouselTimer);
  if (featured.length > 1)
    carouselTimer = setInterval(() => goCarousel((carouselIndex + 1) % featured.length), 5000);
}

function goCarousel(idx) {
  document.querySelectorAll(".carousel-slide").forEach((s,i) => s.classList.toggle("active", i===idx));
  document.querySelectorAll(".carousel-dot").forEach((d,i)  => d.classList.toggle("active", i===idx));
  carouselIndex = idx;
  clearInterval(carouselTimer);
  const total = document.querySelectorAll(".carousel-slide").length;
  if (total > 1)
    carouselTimer = setInterval(() => goCarousel((carouselIndex + 1) % total), 5000);
}

// ═══════════════════════════════════════════════════════════════
//  GRID
// ═══════════════════════════════════════════════════════════════
function getSpan(work, index) {
  // Use real span from manifest (set by generate-manifest.js from image dimensions)
  if (work.gridSpan) return work.gridSpan;
  // Fallback: videos default wide, images use a hash spread
  if (work.type === "video") return "wide";
  const hash = [...work.id].reduce((a,c) => a + c.charCodeAt(0), 0);
  return ["normal","normal","wide","normal","tall","normal"][(hash + index) % 6];
}

function buildGrid() {
  const grid = document.getElementById("works-grid");
  grid.innerHTML = "";

  manifest.works.forEach((work, i) => {
    const item = document.createElement("div");
    item.className = "grid-item";
    item.dataset.tags = JSON.stringify(work.tags);
    item.dataset.id   = work.id;

    const span = getSpan(work, i);
    if (span !== "normal") item.dataset.span = span;

    // Media thumbnail
    const mEl = createMediaEl(work.primaryMedia, work.type, false);
    if (mEl) {
      item.appendChild(mEl);
    } else {
      const ph = document.createElement("div");
      ph.className = "grid-placeholder " + DEMO_GRADS[i % DEMO_GRADS.length];
      const lbl = document.createElement("div");
      lbl.className = "demo-content";
      lbl.textContent = work.id.replace(/_/g," ");
      ph.appendChild(lbl); item.appendChild(ph);
    }

    // Multi-media badge
    if (work.allMedia?.length > 1) {
      const badge = document.createElement("div");
      badge.className = "multi-badge";
      badge.textContent = `1 / ${work.allMedia.length}`;
      item.appendChild(badge);
    }

    // Hover overlay
    const hInfo = document.createElement("div");
    hInfo.className = "grid-hover-info";
    hInfo.innerHTML = `
      <div class="grid-hover-title">${esc(work.title)}</div>
      <div class="grid-hover-tags">
        ${work.tags.map(t=>`<span class="grid-hover-tag">${esc(t)}</span>`).join("")}
      </div>`;
    item.appendChild(hInfo);

    // Preload on hover
    item.addEventListener("mouseenter", () => {
      if (work.primaryMedia && getMediaType(work.primaryMedia) === "image") {
        const pre = new Image(); pre.src = "works/" + work.primaryMedia;
      }
    });

    item.onclick = () => openModal(work);
    grid.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════════
function openModal(work) {
  modalWork = work; modalMediaIndex = 0;
  currentSlot = 'a'; infoPanelOpen = false;

  // Reset slots
  ["a","b"].forEach(id => {
    const s = document.getElementById("modal-slot-" + id);
    s.innerHTML = ""; s.classList.remove("active");
    s.style.opacity = ""; s.style.pointerEvents = "";
  });

  // Reset info panel
  document.getElementById("modal-info-panel").classList.remove("open");
  document.getElementById("modal-info-btn").classList.remove("mbtn-on");
  document.getElementById("modal-info-btn").textContent = "Info";

  // Top bar title
  document.getElementById("modal-title-display").textContent = work.title;

  // Populate info panel
  document.getElementById("modal-info-date").textContent  = work.date || "";
  document.getElementById("modal-info-title").textContent = work.title;
  document.getElementById("modal-info-desc").textContent  = work.description || "";
  document.getElementById("modal-info-tags").innerHTML =
    work.tags.map(t => `<span class="modal-tag">${esc(t)}</span>`).join("");
  const lnk = document.getElementById("modal-info-link");
  if (work.link) { lnk.href = work.link; lnk.style.display = ""; }
  else { lnk.style.display = "none"; }

  // Dots & arrows
  buildModalDots(work);
  const multi = work.allMedia?.length > 1;
  document.getElementById("modal-prev").style.display = multi ? "" : "none";
  document.getElementById("modal-next").style.display = multi ? "" : "none";

  // Load first media directly into slot A
  loadSlotDirect("a", work);

  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function buildModalDots(work) {
  const nav = document.getElementById("modal-media-nav");
  nav.innerHTML = "";
  if (!work.allMedia || work.allMedia.length <= 1) return;
  work.allMedia.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "modal-media-dot" + (i === 0 ? " active" : "");
    dot.onclick = () => { modalMediaIndex = i; renderModalMedia(); };
    nav.appendChild(dot);
  });
}

function updateModalDots() {
  document.querySelectorAll(".modal-media-dot").forEach((d,i) =>
    d.classList.toggle("active", i === modalMediaIndex));
  // Show zoom button only for images
  const src  = modalWork?.allMedia?.[modalMediaIndex];
  const type = getMediaType(src) || modalWork?.type;
  document.getElementById("modal-zoom-btn").style.display = type === "image" ? "" : "none";
}

// First open — load directly, no crossfade from empty
function loadSlotDirect(slotId, work) {
  const src    = work.allMedia?.[modalMediaIndex];
  const type   = getMediaType(src) || work.type;
  const slotEl = document.getElementById("modal-slot-" + slotId);
  slotEl.innerHTML = "";
  showSpinner(true);

  function activate() {
    showSpinner(false);
    slotEl.classList.add("active");
    currentSlot = slotId;
    updateModalDots();
  }

  if (!src) { slotEl.appendChild(makeDemoPlaceholder(modalMediaIndex)); activate(); return; }

  if (type === "image") {
    const img = document.createElement("img");
    img.alt   = work.title;
    img.style.cursor = "zoom-in";
    img.onclick = openZoom;
    img.onload  = activate;
    img.onerror = activate;
    img.src = "works/" + src;
    slotEl.appendChild(img);
  } else {
    const v = makeVideo("works/" + src);
    slotEl.appendChild(v);
    activate();
    v.play().catch(()=>{});
  }
}

// Subsequent switches — crossfade
function renderModalMedia() {
  if (!modalWork) return;
  const src    = modalWork.allMedia?.[modalMediaIndex];
  const type   = getMediaType(src) || modalWork.type;
  const nextId = currentSlot === "a" ? "b" : "a";
  const fromEl = document.getElementById("modal-slot-" + currentSlot);
  const toEl   = document.getElementById("modal-slot-" + nextId);

  toEl.innerHTML = ""; toEl.classList.remove("active");
  showSpinner(true);
  fromEl.querySelectorAll("video").forEach(v => v.pause());

  function swap() {
    showSpinner(false);
    fromEl.classList.remove("active"); fromEl.style.pointerEvents = "none";
    toEl.classList.add("active");      toEl.style.pointerEvents   = "all";
    currentSlot = nextId;
    updateModalDots();
  }

  if (!src) { toEl.appendChild(makeDemoPlaceholder(modalMediaIndex)); swap(); return; }

  if (type === "image") {
    const img = document.createElement("img");
    img.alt   = modalWork.title;
    img.style.cursor = "zoom-in";
    img.onclick = openZoom;
    img.onload  = swap;
    img.onerror = swap;
    img.src = "works/" + src;
    toEl.appendChild(img);
  } else {
    const v = makeVideo("works/" + src);
    toEl.appendChild(v);
    swap();
    setTimeout(() => v.play().catch(()=>{}), 60);
  }
}

function makeVideo(src) {
  const v = document.createElement("video");
  v.src = src; v.muted = true; v.loop = true; v.playsInline = true; v.controls = true;
  return v;
}

function makeDemoPlaceholder(index) {
  const ph = document.createElement("div");
  ph.style.cssText = "width:600px;max-width:88%;height:420px;display:flex;align-items:center;justify-content:center;border-radius:2px;";
  ph.className = DEMO_GRADS[index % DEMO_GRADS.length];
  ph.innerHTML = `<div style="font-family:var(--mono);font-size:.65rem;color:rgba(255,255,255,.12);letter-spacing:.1em;text-transform:uppercase;">media file</div>`;
  return ph;
}

function showSpinner(v) {
  document.getElementById("modal-spinner").classList.toggle("visible", v);
}

function stepMedia(dir) {
  if (!modalWork?.allMedia) return;
  modalMediaIndex = (modalMediaIndex + dir + modalWork.allMedia.length) % modalWork.allMedia.length;
  renderModalMedia();
}

function toggleInfoPanel() {
  infoPanelOpen = !infoPanelOpen;
  document.getElementById("modal-info-panel").classList.toggle("open", infoPanelOpen);
  const btn = document.getElementById("modal-info-btn");
  btn.classList.toggle("mbtn-on", infoPanelOpen);
  btn.textContent = infoPanelOpen ? "Close" : "Info";
}

function openZoom() {
  if (!modalWork) return;
  const src  = modalWork.allMedia?.[modalMediaIndex];
  if (!src) return;
  const type = getMediaType(src) || modalWork.type;
  if (type !== "image") return;

  const content = document.getElementById("zoom-content");
  content.innerHTML = "";
  const img = document.createElement("img");
  img.src = "works/" + src; img.alt = modalWork.title;
  content.appendChild(img);
  document.getElementById("zoom-overlay").classList.add("open");
}

function closeZoom() {
  document.getElementById("zoom-overlay").classList.remove("open");
  document.getElementById("zoom-content").innerHTML = "";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
  document.querySelectorAll(".modal-slot video").forEach(v => v.pause());
  modalWork = null; infoPanelOpen = false;
  document.getElementById("modal-info-panel").classList.remove("open");
  document.getElementById("modal-info-btn").classList.remove("mbtn-on");
  document.getElementById("modal-info-btn").textContent = "Info";
}

document.addEventListener("keydown", e => {
  if (document.getElementById("zoom-overlay").classList.contains("open")) {
    if (e.key === "Escape") closeZoom();
    return;
  }
  if (e.key === "Escape")       closeModal();
  if (e.key === "ArrowLeft"  && modalWork) stepMedia(-1);
  if (e.key === "ArrowRight" && modalWork) stepMedia(1);
  if ((e.key === "i" || e.key === "I") && modalWork) toggleInfoPanel();
  if ((e.key === "z" || e.key === "Z") && modalWork) openZoom();
});

// Click dark area to close
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay") ||
      e.target === document.getElementById("modal-stage")) closeModal();
});

// Touch swipe to cycle media (left = next, right = prev)
let _touchX = 0, _touchY = 0;
document.getElementById("modal-stage").addEventListener("touchstart", e => {
  _touchX = e.changedTouches[0].clientX;
  _touchY = e.changedTouches[0].clientY;
}, { passive: true });
document.getElementById("modal-stage").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - _touchX;
  const dy = e.changedTouches[0].clientY - _touchY;
  if (Math.abs(dx) > 48 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (modalWork?.allMedia?.length > 1) stepMedia(dx < 0 ? 1 : -1);
  }
}, { passive: true });

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function getMediaType(filename) {
  if (!filename) return null;
  const ext = filename.split(".").pop().toLowerCase();
  if (["jpg","jpeg","png","gif","webp","avif","svg"].includes(ext)) return "image";
  if (["mp4","webm","mov","ogg"].includes(ext)) return "video";
  return null;
}

function createMediaEl(src, type, autoplay) {
  if (!src) return null;
  const p = "works/" + src;
  if (type === "video") {
    const v = document.createElement("video");
    v.src = p; v.muted = true; v.loop = true; v.playsInline = true;
    if (autoplay) v.autoplay = true;
    return v;
  }
  if (type === "image") {
    const img = document.createElement("img");
    img.src = p; img.alt = src; img.loading = "lazy";
    return img;
  }
  return null;
}

function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function updateFooter() {
  const n = manifest?.works?.length || 0;
  document.getElementById("footer-count").textContent = `${n} work${n!==1?"s":""}`;
}

// Video hover-play on grid
document.addEventListener("mouseover", e => {
  const item = e.target.closest(".grid-item");
  if (!item) return;
  item.querySelector("video")?.play().catch(()=>{});
});
document.addEventListener("mouseout", e => {
  const item = e.target.closest(".grid-item");
  if (!item) return;
  const v = item.querySelector("video");
  if (v) { v.pause(); v.currentTime = 0; }
});
